<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>DeskGhost</title>
  <link rel="stylesheet" href="ghost.css" />
</head>
<body>
  <div id="stage">
    <div id="bubble" class="hidden"><span id="bubble-text"></span></div>

    <div id="ghost" class="hidden">
      <svg viewBox="0 0 120 130" width="120" height="130" aria-hidden="true">
        <!-- 몸통: 물결치는 아랫단의 유령 -->
        <path id="body" d="
          M 60 8
          C 30 8, 18 34, 18 58
          L 18 104
          Q 25 96, 32 104
          Q 39 112, 46 104
          Q 53 96, 60 104
          Q 67 112, 74 104
          Q 81 96, 88 104
          Q 95 112, 102 104
          L 102 58
          C 102 34, 90 8, 60 8
          Z" />
        <!-- 눈썹 (nag일 때만 표시) -->
        <line class="brow" x1="36" y1="42" x2="52" y2="50" />
        <line class="brow" x1="84" y1="42" x2="68" y2="50" />
        <!-- 눈: 기본(점) / cheer(웃는 눈) / sigh(감은 눈) 를 클래스로 전환 -->
        <g id="eyes-dot">
          <circle cx="44" cy="56" r="5" />
          <circle cx="76" cy="56" r="5" />
        </g>
        <g id="eyes-happy">
          <path d="M 36 58 Q 44 48, 52 58" />
          <path d="M 68 58 Q 76 48, 84 58" />
        </g>
        <g id="eyes-closed">
          <path d="M 36 56 Q 44 62, 52 56" />
          <path d="M 68 56 Q 76 62, 84 56" />
        </g>
        <!-- 볼터치 -->
        <ellipse class="blush" cx="34" cy="68" rx="7" ry="4" />
        <ellipse class="blush" cx="86" cy="68" rx="7" ry="4" />
        <!-- 입 -->
        <path id="mouth-o" d="M 60 72 m -5 0 a 5 5 0 1 0 10 0 a 5 5 0 1 0 -10 0" />
        <path id="mouth-flat" d="M 52 74 L 68 74" />
        <!-- 땀방울 (sigh) -->
        <path id="sweat" d="M 96 34 q 6 8, 0 12 q -6 -4, 0 -12" />
      </svg>
      <div id="shadow"></div>
    </div>
  </div>

  <script src="ghost.js"></script>
</body>
</html>
